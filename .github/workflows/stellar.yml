name: Stellar Soroban CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Run Smart Contract Tests
        run: |
          cd anonymousFeedbackSmartContract/contracts/hello-world
          cargo test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "stellar-connect-wallet/package.json"

      - name: Install Frontend Dependencies
        run: |
          cd stellar-connect-wallet
          npm ci || npm install

      - name: CI Pipeline Success Check
        run: echo "Stellar Shield dApp Frontend & Contract CI workflow completed successfully!"s
